<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add User Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 items-center justify-center min-h-screen">
  <div class="formP   w-full max-w-md userCard  bg-white shadow-md rounded-lg p-6">
    <h2 class="text-2xl font-bold mb-6 text-center">Add User</h2>
    <form action="" class="space-y-4">
      
      <!-- Name -->
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
        <input type="text" id="name" name="name" required
          class="mt-1 block w-full rounded-md border-black-900 p-4 shadow-xl  focus:border-blue-500 focus:ring-blue-500"/>
      </div>

      <!-- Role -->
      <div>
        <label for="role" class="block text-sm font-medium text-gray-700">Role</label>
        <input type="text" id="role" name="role" required
          class="mt-1 block w-full rounded-md border-black-900 p-4 shadow-xl  focus:border-blue-500 focus:ring-blue-500"/>
      </div>

      <!-- Bio -->
      <div>
        <label for="bio" class="block text-sm font-medium text-gray-700">Bio</label>
        <textarea id="bio" name="bio" rows="4" required
          class="mt-1 block w-full rounded-md border-black-900 p-4 shadow-xl  focus:border-blue-500 focus:ring-blue-500"></textarea>
      </div>

      <!-- Photo URL -->
      <div>
        <label for="photourl" class="block text-sm font-medium text-gray-700">Photo URL</label>
        <input type="url" id="photourl" name="photourl" required
          class="mt-1 block w-full rounded-md border-black-900 p-4 shadow-xl  focus:border-blue-500 focus:ring-blue-500"/>
      </div>

      <!-- Submit Button -->
      <button type="submit"
        class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        Submit
      </button>
    </form>
  </div>


  <!-- profile   Cards -->


  <div class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
  <div class="profileCards grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-6xl">
    
    <!-- Card 1 -->
    <div class="userCard userCard  bg-white shadow-md rounded-lg overflow-hidden">
      <img src="https://images.pexels.com/photos/12485087/pexels-photo-12485087.jpeg" alt="User Photo" class="w-40 h-40 rounded-full object-cover">
      <div class="p-4">
        <h3 class="text-lg font-bold">Alice Johnson</h3>
        <p class="text-sm text-gray-600">Frontend Developer</p>
        <p class="mt-2 text-gray-700 text-sm">Passionate about building responsive web interfaces and crafting smooth user experiences.</p>
      </div>
    </div>

  
    

  </div>
</div>


<script src="CallApplyBindThis.js"></script>
</body>
</html>
