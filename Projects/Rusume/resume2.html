<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<div class="container my-5">
<h2 class="text-center mb-4">📄 Resume Builder</h2>

<div class="form-section">
<div class="row">

<div class="col-md-6">
<input id="nameField" class="form-control mb-2" placeholder="Full Name">
<input id="roleField" class="form-control mb-2" placeholder="Role">
<input id="contactField" class="form-control mb-2" placeholder="Contact">
<input id="emailField" class="form-control mb-2" placeholder="Email">
<input id="addressField" class="form-control mb-2" placeholder="Address">

<input id="fbField" class="form-control mb-2" placeholder="Facebook URL">
<input id="instaField" class="form-control mb-2" placeholder="Instagram URL">
<input id="linkedinField" class="form-control mb-2" placeholder="LinkedIn URL">
</div>

<div class="col-md-6">
<textarea id="objectiveField" class="form-control mb-2" placeholder="Profile"></textarea>

<div id="we">
<div class="work-block">
<input class="form-control mb-2 weRole" placeholder="Role">
<input class="form-control mb-2 weCompany" placeholder="Company">
<input class="form-control mb-2 weDuration" placeholder="Duration">
<input class="form-control mb-2 weLocation" placeholder="Location">
<textarea class="form-control mb-2 weTasks" placeholder="Tasks (one per line)"></textarea>
</div>

<button onclick="addWork()" class="btn btn-sm btn-outline-primary">+ Add Experience</button>
</div>

<div id="aq" class="mt-3">
<textarea class="form-control aqField mb-2" placeholder="Education"></textarea>
<button onclick="addField('aqField','aq')" class="btn btn-sm btn-outline-primary">+ Add</button>
</div>

</div>
</div>

<div class="text-center mt-4">
<button onclick="generateCV()" class="btn btn-success">Generate</button>
<button onclick="printCV()" class="btn btn-secondary">Print</button>
<button onclick="downloadPDF()" class="btn btn-dark">PDF</button>
</div>
</div>

<!-- CV TEMPLATE -->
<div id="cv-template" class="modern-cv">
<div class="cv-main">

<div class="cv-header">
<h2 id="nameT"></h2>
<p id="roleT"></p>

<p>
📞 <span id="contactT"></span> |
✉️ <span id="emailT"></span> |
📍 <span id="addressT"></span>
</p>

<p id="linksT"></p>
</div>

<div class="section">
<h4>Profile</h4>
<p id="objectiveT"></p>
</div>

<div class="section">
<h4>Experience</h4>
<div id="weT"></div>
</div>

<div class="section">
<h4>Education</h4>
<ul id="aqT"></ul>
</div>

</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
